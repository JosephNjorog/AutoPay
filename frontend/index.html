<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080810" />

    <title>AutoPayKe — Phone-first money for Africa</title>
    <meta name="description" content="Send money to any phone number across Africa. Settles on M-Pesa, MoMo, Wave or bank — in seconds. No crypto knowledge needed." />
    <meta name="keywords" content="send money Africa, M-Pesa transfer, mobile money, MTN MoMo, Wave money transfer, cross-border payments Africa, USDC payments, send money Kenya, send money Ghana, send money Nigeria, send money Senegal, send money Uganda, send money Tanzania, send money Côte d'Ivoire, remittance Africa, stablecoin payments" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="AutoPayKe" />
    <link rel="canonical" href="https://www.autopayke.com/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Geo / regional targeting — AutoPayKe serves multiple African markets rather than
         one fixed location, so areaServed in the JSON-LD below carries the real signal;
         these legacy meta tags are kept too since some local-search crawlers still read them. -->
    <meta name="geo.region" content="KE; GH; NG; SN; CI; TZ; UG" />
    <meta name="geo.placename" content="Nairobi, Accra, Lagos, Dakar, Abidjan, Dar es Salaam, Kampala" />

    <!-- Open Graph -->
    <meta property="og:title" content="AutoPayKe — Phone-first money for Africa" />
    <meta property="og:description" content="Type a phone number. Type an amount. Done. No bank account, no seed phrase." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.autopayke.com/" />
    <meta property="og:site_name" content="AutoPayKe" />
    <meta property="og:image" content="https://www.autopayke.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AutoPayKe — send money to any phone number across Africa" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AutoPayKe" />
    <meta name="twitter:creator" content="@AutoPayKe" />
    <meta name="twitter:title" content="AutoPayKe — Phone-first money for Africa" />
    <meta name="twitter:description" content="Type a phone number. Type an amount. Done. No bank account, no seed phrase." />
    <meta name="twitter:image" content="https://www.autopayke.com/og-image.png" />
    <meta name="twitter:image:alt" content="AutoPayKe — send money to any phone number across Africa" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/autopay_iconlogo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA / Apple -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoPayKe" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FinancialService",
        "name": "AutoPayKe",
        "url": "https://www.autopayke.com/",
        "logo": "https://www.autopayke.com/autopay_iconlogo.svg",
        "image": "https://www.autopayke.com/og-image.png",
        "description": "Phone-first cross-border payments for Africa. Send money to any phone number, settle instantly on M-Pesa, MTN MoMo, Wave, or bank.",
        "areaServed": [
          { "@type": "Country", "name": "Kenya" },
          { "@type": "Country", "name": "Ghana" },
          { "@type": "Country", "name": "Nigeria" },
          { "@type": "Country", "name": "Senegal" },
          { "@type": "Country", "name": "Côte d'Ivoire" },
          { "@type": "Country", "name": "Tanzania" },
          { "@type": "Country", "name": "Uganda" }
        ],
        "email": "autopayke@gmail.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "autopayke@gmail.com",
          "contactType": "customer support"
        },
        "sameAs": ["https://x.com/AutoPayKe"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Fallback for crawlers/clients that don't execute JavaScript — this is a
         client-rendered SPA, so without this block the raw HTML body is just
         the empty #root div above with no <h1> or text content at all. Most
         AI/GEO crawlers (GPTBot, ClaudeBot, PerplexityBot) and some classic
         search crawlers don't render JS, so this is the only content they see. -->
    <noscript>
      <div style="max-width: 640px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; color: #1a1a2e; line-height: 1.6;">
        <h1 style="font-size: 28px; font-weight: 800;">AutoPayKe — Phone-first money for Africa</h1>
        <p>
          Send money to any phone number across Kenya, Ghana, Nigeria, Senegal, Côte d'Ivoire,
          Tanzania and Uganda. Settles on M-Pesa, MTN MoMo, Wave, Orange Money or bank — in
          seconds, with no crypto knowledge, bank account or seed phrase required.
        </p>
        <p>
          <a href="/signup">Sign up</a> &middot;
          <a href="/login">Log in</a> &middot;
          <a href="/legal/privacy">Privacy Policy</a> &middot;
          <a href="/legal/terms">Terms of Service</a>
        </p>
        <p>Please enable JavaScript to use the AutoPayKe app.</p>
      </div>
    </noscript>
    <!-- Capture beforeinstallprompt as early as possible — Chrome can fire it
         before any framework code runs, and a listener added inside a
         lazily-loaded route component (after React mounts) can miss it
         entirely, permanently losing the native install prompt for that
         page load. -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        window.dispatchEvent(new CustomEvent("pwa-install-available"));
      });
      window.addEventListener("appinstalled", function () {
        window.__pwaInstallPrompt = null;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
